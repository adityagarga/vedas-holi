<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#d62410">
<title>Vedas Menu — Food Truck Indien</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background:
      radial-gradient(circle at 80% 0%, #ef5023, transparent 55%),
      radial-gradient(circle at 0% 100%, #b81d0a, transparent 60%),
      #d62410;
    background-attachment: fixed;
    color: #fff;
    min-height: 100vh;
    padding-bottom: 30px;
  }
  .wrap { max-width: 600px; margin: 0 auto; padding: 0 20px; }

  header { text-align: center; padding: 30px 10px 14px; }
  header h1 {
    font-size: clamp(38px, 12vw, 58px); margin: 0; font-weight: 900;
    letter-spacing: 1px; line-height: .95;
    text-shadow: 0 3px 10px rgba(0,0,0,.25);
  }
  header h2 {
    font-size: clamp(20px, 6vw, 30px); margin: 4px 0 0; font-weight: 800;
    letter-spacing: 1px; opacity: .96;
  }

  /* payment line */
  .pay {
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
    gap: 10px; margin: 16px 0 6px; font-size: 13px; font-weight: 800; letter-spacing: .5px;
  }
  .pay .lbl { text-transform: uppercase; opacity: .95; }
  .pill {
    background: #fff; color: #c4200d; border-radius: 7px; padding: 4px 9px;
    font-weight: 900; font-size: 13px; letter-spacing: .5px;
    box-shadow: 0 2px 5px rgba(0,0,0,.15);
  }
  .pill.cb { letter-spacing: 2px; }

  .cat {
    margin: 26px 0 4px; font-size: clamp(22px, 6vw, 28px); font-weight: 900;
    letter-spacing: 1.5px; text-transform: uppercase;
    border-bottom: 3px solid rgba(255,255,255,.85); padding-bottom: 6px;
    text-shadow: 0 2px 6px rgba(0,0,0,.2);
  }

  .row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 11px 2px; border-bottom: 1px solid rgba(255,255,255,.18);
  }
  .row .num { font-weight: 800; opacity: .8; min-width: 22px; }
  .row .name { font-size: clamp(17px, 4.6vw, 20px); font-weight: 600; }
  .row .veg { color: #8dffae; font-weight: 900; margin-left: 4px; }
  .row .dots { flex: 1; }
  .row .price { font-size: clamp(18px, 5vw, 22px); font-weight: 900; white-space: nowrap; }

  /* inline group for drinks (compact like poster) */
  .inline {
    padding: 12px 2px; font-size: clamp(16px, 4.4vw, 19px); font-weight: 700; line-height: 1.7;
    border-bottom: 1px solid rgba(255,255,255,.18);
  }
  .inline b { font-weight: 900; }
  .inline .sep { opacity: .5; margin: 0 6px; }

  footer {
    text-align: center; margin-top: 30px; padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,.25);
    font-size: 14px; line-height: 1.6; opacity: .95;
  }
  footer .site { font-weight: 800; }
  footer .small { font-size: 12.5px; opacity: .85; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>VEDAS MENU</h1>
      <h2>FOOD TRUCK INDIEN</h2>
      <div class="pay">
        <span class="lbl">Paiement accepté par</span>
        <span class="pill cb">CB</span>
        <span class="pill">Ticket Restaurant</span>
        <span class="lbl">ou espèces</span>
      </div>
    </header>

    <div id="menu"></div>

    <footer>
      <div class="site">www.vedas-restaurant.com &nbsp;|&nbsp; @vedasrestaurantindien</div>
      <div class="small">Contactez-nous pour privatiser le food truck chez vous · 🪔 Happy Holi</div>
    </footer>
  </div>

<script>
// Prices = the till/calculator prices (authoritative). Veg wrap not priced -> omitted.
const SECTIONS = [
  { title: "Wrap", items: [
    { num: 1, n: "Wrap Chicken Tikka", p: 10 },
  ]},
  { title: "Curry Bowls avec Riz", items: [
    { num: 2, n: "Biryani au Poulet", p: 14 },
    { num: 3, n: "Daal Makhani (Lentilles Noires) + Riz", p: 14, veg: true },
    { num: 4, n: "Butter Chicken + Riz", p: 14 },
    { num: 5, n: "Agneau Rogan Josh + Riz", p: 14 },
    { num: 6, n: "Butter Chicken + Agneau Curry + Riz", p: 16 },
  ]},
  { title: "Snacks", items: [
    { num: 7, n: "Naan au Fromage", p: 4, veg: true },
    { num: 8, n: "Samosas aux Légumes x2", p: 6, veg: true },
    { num: 9, n: "Samosa Chaat", p: 9, veg: true },
  ]},
];

const DESSERTS = [
  { n: "Lassi Mango Alfonso", p: 5 },
  { n: "Gâteau Indien", p: 4 },
];

const DRINKS = [
  { n: "Café", p: 2 },
  { n: "Chai", p: 3 },
  { n: "Eau / Soda", p: 2 },
  { n: "Bière Blonde Indienne", p: 5 },
];

const el = document.getElementById('menu');

function catEl(t) { const d = document.createElement('div'); d.className='cat'; d.textContent=t; return d; }
function rowEl(it) {
  const r = document.createElement('div'); r.className='row';
  r.innerHTML = `${it.num ? `<span class="num">${it.num}.</span>` : ''}`
    + `<span class="name">${it.n}${it.veg ? '<span class="veg">v</span>' : ''}</span>`
    + `<span class="dots"></span><span class="price">${it.p}&nbsp;€</span>`;
  return r;
}

SECTIONS.forEach(s => {
  el.appendChild(catEl(s.title));
  s.items.forEach(it => el.appendChild(rowEl(it)));
});

// Lassi / Dessert
el.appendChild(catEl("Lassi · Dessert"));
DESSERTS.forEach(it => el.appendChild(rowEl(it)));

// Boissons - Bière (compact inline like the poster)
el.appendChild(catEl("Boissons · Bière"));
const inl = document.createElement('div');
inl.className = 'inline';
inl.innerHTML = DRINKS.map(d => `${d.n} <b>${d.p}&nbsp;€</b>`).join('<span class="sep">|</span>');
el.appendChild(inl);
</script>
</body>
</html>
