<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#b23a00">
<title>Vedas — Menu</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,180,80,.35), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(214,40,40,.25), transparent 45%),
      #fff5ec;
    color: #2a1a10;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 18px; }

  header {
    text-align: center; padding: 34px 18px 18px;
  }
  header .lamp { font-size: 46px; line-height: 1; }
  header h1 {
    font-size: 40px; margin: 8px 0 2px; font-weight: 900;
    letter-spacing: 1px; color: #b23a00;
  }
  header .sub { font-size: 15px; color: #9a6b4f; letter-spacing: 3px; text-transform: uppercase; }

  .cat {
    display: flex; align-items: center; gap: 12px;
    margin: 26px 0 10px; color: #b23a00;
  }
  .cat::before, .cat::after { content:""; flex:1; height:2px; background: linear-gradient(90deg, transparent, #e8b48a, transparent); }
  .cat span { font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }

  .row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 13px 16px; margin-bottom: 8px;
    background: rgba(255,255,255,.75); border-radius: 14px;
    border: 1px solid rgba(178,58,0,.10);
    box-shadow: 0 1px 4px rgba(120,60,20,.06);
  }
  .row .name { font-size: 17px; font-weight: 600; }
  .row .dots { flex: 1; border-bottom: 2px dotted #e0c3aa; transform: translateY(-4px); min-width: 14px; }
  .row .price { font-size: 18px; font-weight: 900; color: #b23a00; white-space: nowrap; }
  .row .tag { font-size: 11px; font-weight: 700; color:#1a8f3c; border:1px solid #1a8f3c; border-radius:6px; padding:1px 5px; margin-left:6px; vertical-align:middle;}

  footer { text-align: center; margin-top: 34px; color: #b08b72; font-size: 13px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="lamp">🪔</div>
      <h1>Vedas</h1>
      <div class="sub">Holi · Food Truck</div>
    </header>

    <div id="menu"></div>

    <footer>Bon appétit · धन्यवाद</footer>
  </div>

<script>
const MENU = {
  "Plats": [
    { n: "Wrap Chicken Tikka", p: 10 },
    { n: "Biryani au Poulet", p: 14 },
    { n: "Daal Makhani (Lentilles Noires) + Riz", p: 14 },
    { n: "Butter Chicken + Riz", p: 14 },
    { n: "Agneau Rogan Josh + Riz", p: 14 },
    { n: "Butter Chicken + Agneau Curry + Riz", p: 16 },
    { n: "Naan au Fromage", p: 4 },
    { n: "Samosas aux Légumes x2", p: 6 },
    { n: "Samosa Chaat", p: 9 },
  ],
  "Boissons & Desserts": [
    { n: "Lassi Mango Alfonso", p: 5 },
    { n: "Gâteau Indien", p: 4 },
    { n: "Café", p: 2 },
    { n: "Chai", p: 3 },
    { n: "Eau / Soda", p: 2 },
    { n: "Bière Blonde Indienne", p: 5 },
  ]
};

const el = document.getElementById('menu');
for (const cat in MENU) {
  const c = document.createElement('div');
  c.className = 'cat';
  c.innerHTML = `<span>${cat}</span>`;
  el.appendChild(c);
  MENU[cat].forEach(it => {
    const r = document.createElement('div');
    r.className = 'row';
    r.innerHTML = `<span class="name">${it.n}</span><span class="dots"></span><span class="price">${it.p}&nbsp;€</span>`;
    el.appendChild(r);
  });
}
</script>
</body>
</html>
